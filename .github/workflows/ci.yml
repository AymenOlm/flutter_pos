name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze_test:
    name: Analyze & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
      - name: CI diagnostics
        run: |
          echo "--- runner info ---"
          uname -a || true
          echo "--- flutter version ---"
          flutter --version || true
          echo "--- which flutter ---"
          which flutter || true
          echo "--- env sample ---"
          env | sort | sed -n '1,200p' || true
      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
      - name: Get dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Run tests
        run: flutter test --coverage

  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyze_test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
      - name: Get dependencies
        run: flutter pub get
      - name: Build windows
        run: flutter build windows --release
